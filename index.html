<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM Punjab Laptop Scheme 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #006633; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #006633; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #004d26; }
        .google-btn { background: white; color: #444; border: 1px solid #ddd; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .hidden { display: none; }
        .user-info { font-size: 14px; color: #666; margin-bottom: 20px; background: #e8f5e9; padding: 10px; border-radius: 5px; }
        label { display: block; text-align: left; font-weight: bold; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>Student Login</h2>
        <p>Please login to apply for the scheme.</p>
        <input type="email" id="login-email" placeholder="Email Address">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="loginEmail()">Login / Sign Up</button>
        <p>OR</p>
        <button class="google-btn" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20"> Continue with Google
        </button>
    </div>

    <div id="form-section" class="hidden">
        <h2>Application Form</h2>
        <div class="user-info">Logged in: <b id="user-display"></b></div>
        
        <label>Full Name (as per CNIC)</label>
        <input type="text" id="full-name" placeholder="Enter your full name">
        
        <label>Father's Name</label>
        <input type="text" id="father-name" placeholder="Enter father's name">
        
        <label>CNIC Number</label>
        <input type="text" id="cnic" placeholder="35202-xxxxxxx-x">
        
        <label>WhatsApp Number</label>
        <input type="text" id="whatsapp" placeholder="03xxxxxxxxx">
        
        <label>University Name</label>
        <input type="text" id="uni" placeholder="e.g. PU, UET, GCU">
        
        <label>Degree Program</label>
        <select id="degree">
            <option value="BS">BS / Undergraduate</option>
            <option value="MS">MS / MPhil</option>
            <option value="PhD">PhD</option>
        </select>
        
        <label>Current CGPA / Percentage</label>
        <input type="number" step="0.01" id="cgpa" placeholder="e.g. 3.50">

        <button id="submit-btn" onclick="submitData()">Submit Application</button>
        <button onclick="logout()" style="background:#cc0000; margin-top:15px;">Logout</button>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAvL5opTN8rSsPfOa4ywnv-flR2AJz-z7s",
        authDomain: "cm-laptop-scheme-2026.firebaseapp.com",
        projectId: "cm-laptop-scheme-2026",
        storageBucket: "cm-laptop-scheme-2026.firebasestorage.app",
        messagingSenderId: "868877730785",
        appId: "1:868877730785:web:bc7fe57b2a4a4c260988a0"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ERROR FIX 1: Refresh par login maintain rakhne ka logic
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.email;
        } else {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('form-section').classList.add('hidden');
        }
    });

    // Google Login Function
    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => alert("Error: " + e.message));
    }

    // Email/Password Login Function
    function loginEmail() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        if(!email || !pass) return alert("Fields are empty");
        
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            if(err.code === 'auth/user-not-found') {
                auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            } else { alert(err.message); }
        });
    }

    // Logout Function
    function logout() {
        auth.signOut();
    }

    // ERROR FIX 2: Data Submission with more fields
    async function submitData() {
        const btn = document.getElementById('submit-btn');
        const data = {
            fullName: document.getElementById('full-name').value,
            fatherName: document.getElementById('father-name').value,
            cnic: document.getElementById('cnic').value,
            whatsapp: document.getElementById('whatsapp').value,
            university: document.getElementById('uni').value,
            degree: document.getElementById('degree').value,
            cgpa: document.getElementById('cgpa').value,
            email: auth.currentUser.email,
            submittedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!data.fullName || !data.cnic || !data.university) {
            return alert("Zaroori fields lazmi bharein!");
        }

        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            // "applications" collection mein data save karna
            await db.collection("applications").add(data);
            alert("Mubarak Ho! Aapki details save ho gayi hain.");
            btn.innerText = "Submitted ✅";
        } catch (error) {
            alert("Submission Error: " + error.message);
            btn.innerText = "Submit Application";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
