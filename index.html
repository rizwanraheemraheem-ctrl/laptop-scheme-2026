<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM Punjab Laptop Scheme 2026 Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f0f2f5; }
        .header { background-color: #006633; color: white; padding: 25px; text-align: center; border-bottom: 6px solid #ffcc00; }
        .container { max-width: 450px; margin: 30px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        h2 { color: #006633; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; }
        input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #006633; outline: none; box-shadow: 0 0 5px rgba(0,102,51,0.3); }
        button { width: 100%; padding: 15px; background-color: #006633; color: white; border: none; margin-top: 30px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #004d26; transform: translateY(-2px); }
        .footer { text-align: center; margin-top: 30px; color: #777; font-size: 13px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Government of Punjab</h1>
    <p>Chief Minister Laptop Scheme 2026</p>
</div>

<div class="container">
    <h2>Apply Online</h2>
    <form id="laptopForm">
        <label>Full Name</label>
        <input type="text" id="userName" placeholder="Enter your full name" required>

        <label>CNIC Number</label>
        <input type="text" id="userCnic" placeholder="35202-xxxxxxx-x" required>

        <label>University Name</label>
        <input type="text" id="userUni" placeholder="Enter University/College" required>

        <label>Email Address</label>
        <input type="email" id="userEmail" placeholder="example@mail.com" required>

        <button type="submit" id="submitBtn">Submit Application</button>
    </form>
</div>

<div class="footer">
    <p>&copy; 2026 Higher Education Department | Punjab Information Technology Board</p>
</div>

<script>
    // 1. Apne Firebase ki settings yahan paste karein
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // 2. Firebase Initialize karein
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 3. Form Submission Logic
    const form = document.getElementById('laptopForm');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const data = {
            name: document.getElementById('userName').value,
            cnic: document.getElementById('userCnic').value,
            university: document.getElementById('userUni').value,
            email: document.getElementById('userEmail').value,
            submittedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            // "applications" naam ke collection mein data save hoga
            await db.collection("applications").add(data);
            alert("Mubarak ho! Aap ki application submit ho gayi hai.");
            form.reset();
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Maazrat! Data save nahi ho saka. " + error.message);
        } finally {
            btn.innerText = "Submit Application";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
